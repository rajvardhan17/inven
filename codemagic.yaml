workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60

    environment:
      flutter: stable
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          flutter pub get

      - name: Clean project
        script: |
          flutter clean

      - name: Build iOS (no signing)
        script: |
          flutter build ios --no-codesign

    artifacts:
      - build/ios/iphoneos/*.app